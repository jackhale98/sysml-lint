name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone tree-sitter-sysml grammar
        run: git clone https://github.com/jackhale98/tree-sitter-sysml.git ../tree-sitter-sysml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test

      - name: Lint fixtures
        run: cargo run -- --severity error --disable duplicates,syntax test/fixtures/*.sysml
